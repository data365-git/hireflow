name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scenario-suite:
    name: E2E Scenarios
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: hireflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Run E2E scenario suite
        run: npm run test:e2e
        env:
          DATABASE_URL: postgres://postgres:test@localhost:5432/hireflow_test
          TELEGRAM_BOT_TOKEN: test-token-not-real
          TELEGRAM_WEBHOOK_SECRET: test-secret
          NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: hireflow_test_bot
          BACKUP_SECRET: test-backup-secret
          NODE_ENV: test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ github.run_id }}
          path: tests/reports/latest.json
          retention-days: 30

  load-test:
    name: Load Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.ref == 'refs/heads/main' ||
      contains(github.event.head_commit.message, '[load]')

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: hireflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci

      - name: Run load tests
        run: npm run test:e2e:load
        env:
          DATABASE_URL: postgres://postgres:test@localhost:5432/hireflow_test
          TELEGRAM_BOT_TOKEN: test-token-not-real
          TELEGRAM_WEBHOOK_SECRET: test-secret
          NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: hireflow_test_bot
          BACKUP_SECRET: test-backup-secret
          NODE_ENV: test

      - name: Upload load report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-report-${{ github.run_id }}
          path: tests/reports/
          retention-days: 90
